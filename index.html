<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LRC Studio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #12101e;
      --surface: rgba(255,255,255,0.07);
      --surface-hover: rgba(255,255,255,0.13);
      --border: rgba(255,255,255,0.14);
      --accent: #a78bfa;
      --accent2: #60a5fa;
      --accent-glow: rgba(167,139,250,0.28);
      --text: #f1f0f5;
      --muted: rgba(241,240,245,0.42);
      --success: #34d399;
      --warn: #fbbf24;
      --danger: #f87171;
      --mono: 'Space Mono', monospace;
      --sans: 'Syne', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }

    #bg-art { position: fixed; inset: 0; z-index: 0; background-size: cover; background-position: center; filter: blur(28px) brightness(0.45) saturate(1.3); transform: scale(1.12); opacity: 0; transition: opacity 1.4s ease; }
    #bg-art.visible { opacity: 1; }
    #bg-noise { position: fixed; inset: 0; z-index: 1; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); }

    #app { position: relative; z-index: 2; display: grid; grid-template-columns: 300px 1fr; height: 100vh; overflow: hidden; }

    /* LEFT */
    #left { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: rgba(18,15,32,0.55); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px); overflow-y: auto; overflow-x: hidden; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    #left::-webkit-scrollbar { width: 3px; }
    #left::-webkit-scrollbar-thumb { background: var(--border); }

    .logo-bar { padding: 20px 22px 15px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .logo { font-size: 20px; font-weight: 800; line-height: 1; letter-spacing: -.01em; }
    .logo em { color: var(--accent); font-style: normal; }
    .logo-sub { font-size: 9px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

    #art-wrap { margin: 16px 22px 0; aspect-ratio: 1; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: box-shadow .7s; }
    #art-wrap.glow { box-shadow: 0 0 44px var(--accent-glow); }
    #art-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    #art-img.on { display: block; }
    #art-ph { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--muted); }
    #art-ph svg { width: 46px; height: 46px; opacity: .28; }
    #art-ph span { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; }

    #track-meta { padding: 12px 22px 0; flex-shrink: 0; }
    #t-title { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #t-artist { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    #wave-area { padding: 14px 22px 0; flex-shrink: 0; }
    #wave-canvas { width: 100%; height: 56px; display: block; border-radius: 6px; cursor: pointer; }
    #prog-wrap { margin-top: 7px; height: 3px; background: var(--surface-hover); border-radius: 99px; overflow: hidden; cursor: pointer; }
    #prog-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width .1s linear; }
    #time-row { display: flex; justify-content: space-between; font-size: 10px; font-family: var(--mono); color: var(--muted); margin-top: 4px; }

    #transport { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 22px; flex-shrink: 0; }
    .t-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 8px; border-radius: 50%; transition: color .18s, background .18s; display: flex; align-items: center; justify-content: center; }
    .t-btn:hover { color: var(--text); background: var(--surface-hover); }
    #btn-play { width: 50px; height: 50px; border-radius: 50%; background: var(--accent); color: #fff; box-shadow: 0 0 24px var(--accent-glow); transition: background .18s; }
    #btn-play:hover { background: #c4b5fd; color: #fff; }

    #tap-btn { margin: 6px 22px 0; padding: 18px 0; border-radius: 12px; border: 1.5px solid var(--accent); background: transparent; color: var(--accent); font-family: var(--sans); font-size: 14px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: background .18s, box-shadow .18s, transform .1s; flex-shrink: 0; touch-action: manipulation; user-select: none; }
    #tap-btn:hover { background: var(--accent-glow); box-shadow: 0 0 20px var(--accent-glow); }
    #tap-btn:active { transform: scale(.96); }
    .kbd { background: var(--surface-hover); border: 1px solid var(--border); border-radius: 4px; padding: 1px 7px; font-size: 10px; font-family: var(--mono); color: var(--muted); }

    #undo-row { margin: 8px 22px 0; flex-shrink: 0; }
    #btn-undo { width: 100%; padding: 10px 0; border-radius: 8px; border: 1px solid rgba(251,191,36,.3); background: rgba(251,191,36,.06); color: var(--warn); font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background .18s, box-shadow .18s; }
    #btn-undo:hover { background: rgba(251,191,36,.14); box-shadow: 0 0 14px rgba(251,191,36,.18); }
    #btn-undo:disabled { opacity: .28; cursor: not-allowed; }

    #char-panel { margin: 10px 22px 0; flex-shrink: 0; }
    .sec-label { font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
    #char-btns { display: flex; flex-wrap: wrap; gap: 5px; }
    .char-btn { padding: 5px 11px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 15px; cursor: pointer; transition: background .14s, border-color .14s, transform .1s; }
    .char-btn:hover { background: var(--surface-hover); border-color: var(--accent); }
    .char-btn:active { transform: scale(.88); }

    #progress-wrap { margin: 10px 22px 0; flex-shrink: 0; }
    #progress-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; font-size: 11px; font-family: var(--mono); color: var(--muted); text-align: center; }
    #progress-pill.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    #progress-pill.done { border-color: var(--success); color: var(--success); background: rgba(52,211,153,.08); }

    #meta-area { padding: 12px 22px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; margin-top: auto; }
    .f-label { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
    .f-input { width: 100%; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; transition: border-color .18s, box-shadow .18s; }
    .f-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .upload-zone { margin: 0 22px 8px; padding: 12px; flex-shrink: 0; border: 1.5px dashed var(--border); border-radius: 9px; cursor: pointer; color: var(--muted); font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: border-color .2s, background .2s, color .2s; }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
    .upload-zone.loaded { border-style: solid; border-color: var(--success); color: var(--success); background: rgba(52,211,153,.07); }
    #file-input, #lrc-file-input { display: none; }

    /* ════ R2 SEARCH PANEL ════ */
    #r2-search-panel { margin: 0 22px 8px; flex-shrink: 0; }

    /* Worker URL 設定 */
    #r2-url-row { display: flex; gap: 5px; margin-bottom: 6px; align-items: center; }
    #cfg-worker-url {
      flex: 1; padding: 7px 10px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-family: var(--mono); font-size: 10px; outline: none;
      transition: border-color .18s;
    }
    #cfg-worker-url:focus { border-color: var(--accent); }
    #cfg-worker-url::placeholder { color: rgba(241,240,245,.25); }
    #btn-connect {
      padding: 7px 12px; border-radius: 7px; white-space: nowrap;
      border: 1px solid rgba(167,139,250,.4); background: rgba(167,139,250,.08);
      color: var(--accent); font-family: var(--sans); font-size: 10px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase; cursor: pointer;
      transition: background .14s;
    }
    #btn-connect:hover { background: rgba(167,139,250,.2); }

    /* Search row */
    #r2-search-row { display: flex; gap: 5px; margin-bottom: 5px; }
    #r2-search-in { flex: 1; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 12px; outline: none; transition: border-color .18s, box-shadow .18s; }
    #r2-search-in:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    #r2-search-in::placeholder { color: var(--muted); }
    #btn-r2-search { padding: 8px 14px; border-radius: 8px; border: none; background: var(--accent); color: #fff; font-family: var(--sans); font-size: 11px; font-weight: 700; cursor: pointer; transition: opacity .18s; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
    #btn-r2-search:hover { opacity: .82; }
    #btn-r2-search:disabled { opacity: .4; cursor: not-allowed; }

    #r2-status { font-size: 10px; font-family: var(--mono); color: var(--muted); padding: 3px 2px; text-align: center; min-height: 20px; }
    #r2-status.err  { color: var(--danger); }
    #r2-status.ok   { color: var(--success); }
    #r2-status.info { color: var(--accent); }

    #r2-results { max-height: 260px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; display: flex; flex-direction: column; gap: 4px; }
    #r2-results::-webkit-scrollbar { width: 3px; }

    .r2-result-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 9px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; transition: background .14s, border-color .14s, transform .1s; animation: fadeUp .16s ease both; }
    .r2-result-item:hover { background: var(--surface-hover); border-color: var(--accent); }
    .r2-result-item:active { transform: scale(.98); }

    .r2-thumb { width: 42px; height: 42px; border-radius: 7px; background: rgba(255,255,255,.08); flex-shrink: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); }
    .r2-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .r2-thumb svg { opacity: .3; }
    .r2-info { flex: 1; min-width: 0; }
    .r2-title  { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .r2-artist { font-size: 10px; color: var(--muted); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .r2-dur    { font-size: 9px; color: rgba(241,240,245,.28); font-family: var(--mono); margin-top: 2px; }
    .r2-load-btn { flex-shrink: 0; padding: 5px 11px; border-radius: 6px; border: 1px solid rgba(167,139,250,.4); background: rgba(167,139,250,.08); color: var(--accent); font-family: var(--mono); font-size: 10px; cursor: pointer; transition: background .14s; white-space: nowrap; }
    .r2-load-btn:hover { background: rgba(167,139,250,.2); }
    .r2-load-btn.loading { opacity: .5; pointer-events: none; }

    /* speed */
    #speed-row { display: flex; align-items: center; gap: 6px; margin: 6px 22px 0; flex-shrink: 0; }
    #speed-label { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    .spd-btn { flex: 1; padding: 6px 0; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-family: var(--mono); font-size: 10px; cursor: pointer; transition: background .14s, color .14s, border-color .14s; }
    .spd-btn:hover { background: var(--surface-hover); color: var(--text); }
    .spd-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); font-weight: 700; }

    /* adj */
    #adj-panel { margin: 6px 22px 0; flex-shrink: 0; }
    #adj-rows { display: flex; flex-direction: column; gap: 4px; max-height: 130px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .adj-row { display: flex; align-items: center; gap: 5px; padding: 3px 0; }
    .adj-ts { font-family: var(--mono); font-size: 10px; color: var(--accent); flex-shrink: 0; min-width: 62px; }
    .adj-txt { font-size: 11px; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .adj-btn { padding: 3px 7px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 11px; cursor: pointer; font-family: var(--mono); transition: background .12s, color .12s; flex-shrink: 0; }
    .adj-btn:hover { background: var(--surface-hover); color: var(--text); }

    /* RIGHT */
    #right { display: grid; grid-template-rows: auto 1fr auto; overflow: hidden; background: rgba(18,15,32,0.35); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
    #right-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; border-bottom: 1px solid var(--border); }
    #right-head h2 { font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); }
    #line-badge { font-size: 10px; font-family: var(--mono); padding: 3px 9px; border-radius: 99px; background: var(--surface-hover); border: 1px solid var(--border); color: var(--muted); }

    #panes { display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }
    .pane { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
    .pane:last-child { border-right: none; }
    .pane-head { padding: 9px 18px; font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .ph-btns { display: flex; gap: 4px; }
    .ph-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 9px; font-family: var(--sans); letter-spacing: .08em; text-transform: uppercase; padding: 3px 8px; border-radius: 5px; border: 1px solid transparent; transition: color .15s, background .15s, border-color .15s; }
    .ph-btn:hover { color: var(--text); background: var(--surface-hover); }
    .ph-btn.danger:hover { color: var(--danger); border-color: rgba(248,113,113,.3); }
    .ph-btn.accent-btn:hover { color: var(--accent); border-color: rgba(167,139,250,.3); }

    #lyrics-wrap { flex: 1; overflow: hidden; position: relative; }
    #lyrics-in { position: absolute; inset: 0; width: 100%; height: 100%; background: transparent; border: none; outline: none; resize: none; color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.9; padding: 18px 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    #lyrics-display-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #current-line-display { padding: 20px 20px 8px; font-size: 18px; font-weight: 700; color: var(--text); line-height: 1.4; min-height: 64px; flex-shrink: 0; border-bottom: 1px solid var(--border); position: relative; }
    #current-line-display::before { content: 'NOW'; position: absolute; top: 8px; left: 20px; font-size: 8px; letter-spacing: .18em; color: var(--accent); font-family: var(--mono); }
    #next-lines-display { flex: 1; overflow-y: auto; padding: 12px 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .next-line-row { padding: 5px 0; font-size: 13px; color: var(--muted); font-family: var(--mono); border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: baseline; }
    .next-line-row .nl-num { font-size: 10px; color: rgba(241,240,245,.2); min-width: 18px; }
    .lrc-done-row { display: flex; align-items: center; padding: 4px 8px; border-radius: 7px; margin: 1px 0; transition: background .13s; cursor: pointer; gap: 2px; }
    .lrc-done-row:hover { background: var(--surface-hover); }
    .lrc-ts { font-family: var(--mono); font-size: 11px; color: var(--muted); flex-shrink: 0; min-width: 74px; user-select: none; }
    .lrc-txt { font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: var(--mono); }

    #lrc-raw-wrap { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    #lrc-raw-wrap.on { display: flex; }
    #lrc-raw-out { flex: 1; background: transparent; border: none; outline: none; resize: none; color: var(--text); font-family: var(--mono); font-size: 12px; line-height: 1.8; padding: 16px 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }

    #bottom { padding: 13px 28px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .a-btn { padding: 9px 18px; border-radius: 8px; border: none; font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: opacity .18s, transform .1s, box-shadow .18s, background .18s; white-space: nowrap; }
    .a-btn:active { transform: scale(.96); }
    .a-btn.pri { background: var(--accent); color: #fff; box-shadow: 0 0 18px var(--accent-glow); }
    .a-btn.pri:hover { opacity: .84; }
    .a-btn.sec { background: var(--surface-hover); border: 1px solid var(--border); color: var(--text); }
    .a-btn.sec:hover { background: rgba(255,255,255,.12); }
    .a-btn.warn-btn { background: rgba(251,191,36,.1); border: 1px solid rgba(251,191,36,.3); color: var(--warn); }
    .a-btn.warn-btn:hover { background: rgba(251,191,36,.2); }
    .a-btn.dng { background: rgba(248,113,113,.1); border: 1px solid rgba(248,113,113,.28); color: var(--danger); }
    .a-btn.dng:hover { background: rgba(248,113,113,.2); }

    #status-msg { margin-left: auto; font-size: 10px; font-family: var(--mono); color: var(--muted); white-space: nowrap; }
    #status-msg.ok { color: var(--success); }
    #status-msg.warn { color: var(--warn); }
    #status-msg.err { color: var(--danger); }

    #toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(14px); background: rgba(18,16,28,.96); border: 1px solid var(--border); backdrop-filter: blur(18px); padding: 9px 22px; border-radius: 99px; font-size: 12px; color: var(--text); letter-spacing: .04em; opacity: 0; pointer-events: none; z-index: 999; transition: opacity .26s, transform .26s; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(7px); } to { opacity:1; transform:translateY(0); } }
    .lrc-done-row, .r2-result-item { animation: fadeUp .16s ease both; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 12px; height: 12px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; }
  </style>
</head>
<body>
<div id="bg-art"></div>
<div id="bg-noise"></div>
<audio id="audio" crossOrigin="anonymous"></audio>

<div id="app">
  <!-- ═══ LEFT ═══ -->
  <div id="left">
    <div class="logo-bar">
      <div class="logo">LRC<em>•</em>STUDIO</div>
      <div class="logo-sub">Lyric Timing Tool</div>
    </div>

    <div id="art-wrap">
      <img id="art-img" alt="">
      <div id="art-ph">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5"/><path d="M12 3v2.2M12 18.8V21M3 12h2.2M18.8 12H21"/></svg>
        <span>No Track</span>
      </div>
    </div>

    <div id="track-meta">
      <div id="t-title">—</div>
      <div id="t-artist">unknown artist</div>
    </div>

    <div id="wave-area">
      <canvas id="wave-canvas" height="56"></canvas>
      <div id="prog-wrap"><div id="prog-bar"></div></div>
      <div id="time-row"><span id="t-cur">0:00</span><span id="t-tot">0:00</span></div>
    </div>

    <div id="transport">
      <button class="t-btn" id="btn-back">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>
      </button>
      <button class="t-btn" id="btn-play">
        <svg id="ico-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>

<script>
// ═══════════════════════════════════════════════════════
//  ★ WORKER URL PLACEHOLDER ★
//  wrangler deploy 後に表示される URL をここに貼り付ける
//  例: "https://lrc-studio-r2-proxy.username.workers.dev"
// ═══════════════════════════════════════════════════════
const DEFAULT_WORKER_URL = "https://lrc-studio-r2-proxy.miuranosuketatsuya06.workers.dev";
// ═══════════════════════════════════════════════════════

// ─────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────
const ST = {
  lyricsArray: [], timingIndex: 0, lrcLines: [], undoStack: [],
  audioFile: null, rawLyrics: '', isPlaying: false, duration: 0, loaded: false,
  rightView: 'live',
};

// ─────────────────────────────────────────────────────
//  R2 CONFIG  (sessionStorage に保存)
// ─────────────────────────────────────────────────────
let R2_WORKER = '';   // 接続済み Worker URL
let r2Index   = null; // キャッシュ済みインデックス
let r2SearchDebounce = null;

// ページ読み込み時に保存済み URL を復元
(function initWorkerUrl() {
  try {
    const saved = sessionStorage.getItem('lrc_worker_url');
    R2_WORKER = saved || DEFAULT_WORKER_URL;
  } catch(e) { R2_WORKER = DEFAULT_WORKER_URL; }
  const el = document.getElementById('cfg-worker-url');
  if (el) el.value = R2_WORKER;
})();

// ── 接続ボタン ──────────────────────────────────────
async function connectR2() {
  const url = document.getElementById('cfg-worker-url').value.trim();
  if (!url) {
    setR2Status('⚠ Worker URL を入力してください', 'err'); return;
  }
  R2_WORKER = url.replace(/\/$/, '');
  r2Index   = null;
  try { sessionStorage.setItem('lrc_worker_url', R2_WORKER); } catch(e) {}
  setR2Status('接続テスト中…', 'info');
  const idx = await fetchR2Index();
  if (idx) {
    setR2Status(`✓ ${idx.length} 曲読み込み完了`, 'ok');
    showToast(`✓ R2 接続成功 — ${idx.length} 曲`);
  }
}

// ── R2 URL 生成 ─────────────────────────────────────
function r2Url(path) {
  return `${R2_WORKER}/stream?path=${encodeURIComponent(path)}`;
}

// ── インデックス取得 (キャッシュ付き) ───────────────
async function fetchR2Index() {
  if (r2Index) return r2Index;
  if (!R2_WORKER || R2_WORKER.includes('YOUR_WORKER')) {
    setR2Status('⚠ Worker URL が設定されていません', 'err'); return null;
  }
  try {
    const res = await fetch(`${R2_WORKER}/music_index.json`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    r2Index = await res.json();
    return r2Index;
  } catch(e) {
    setR2Status('⚠ インデックス取得失敗: ' + e.message, 'err');
    return null;
  }
}

// ── 検索 (デバウンス) ────────────────────────────────
function onR2SearchInput() {
  clearTimeout(r2SearchDebounce);
  const q = document.getElementById('r2-search-in').value.trim();
  if (!q) { document.getElementById('r2-results').innerHTML = ''; setR2Status(''); return; }
  r2SearchDebounce = setTimeout(doR2Search, 380);
}

async function doR2Search() {
  const q   = document.getElementById('r2-search-in').value.trim().toLowerCase();
  if (!q) return;
  const btn = document.getElementById('btn-r2-search');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  setR2Status('検索中…', 'info');

  const index = await fetchR2Index();
  btn.disabled = false;
  btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> 検索';
  if (!index) return;

  const hits = index.filter(item =>
    (item.title  || '').toLowerCase().includes(q) ||
    (item.artist || '').toLowerCase().includes(q)
  ).slice(0, 40);

  const container = document.getElementById('r2-results');
  container.innerHTML = '';
  if (!hits.length) { setR2Status(`"${q}" の曲が見つかりません`, 'err'); return; }
  setR2Status(`${hits.length} 件ヒット`, 'ok');

  hits.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'r2-result-item';
    row.style.animationDelay = (i * 0.025) + 's';

    // カバー画像 URL を決定
    let coverSrc = '';
    if (item.cover?.data) {
      if (typeof item.cover.data === 'string' && item.cover.data.startsWith('/')) {
        coverSrc = r2Url(item.cover.data);
      } else if (typeof item.cover.data === 'string' && item.cover.data.length > 0) {
        const fmt = item.cover.format || 'image/jpeg';
        coverSrc = `data:${fmt};base64,${item.cover.data}`;
      }
    } else if (item.artistImage) {
      if (item.artistImage.startsWith('/')) {
        coverSrc = r2Url(item.artistImage);
      } else if (item.artistImage.length > 0) {
        coverSrc = `data:image/jpeg;base64,${item.artistImage}`;
      }
    }

    const thumbHtml = coverSrc
      ? `<img src="${coverSrc}" alt="" loading="lazy" onerror="this.style.display='none'">`
      : `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.5"/></svg>`;

    row.innerHTML = `
      <div class="r2-thumb">${thumbHtml}</div>
      <div class="r2-info">
        <div class="r2-title">${esc(item.title || item.path || '—')}</div>
        <div class="r2-artist">${esc(item.artist || 'Unknown Artist')}</div>
        <div class="r2-dur">${item.duration ? fmtTime(item.duration) : '--:--'}</div>
      </div>
      <button class="r2-load-btn">読み込む</button>`;

    // サムネイルが取れなかった場合のみ、ID3から非同期取得
    if (!coverSrc && item.path) {
      const thumb = row.querySelector('.r2-thumb');
      extractR2Cover(r2Url(item.path)).then(url => {
        if (!url) return;
        thumb.innerHTML = `<img src="${url}" alt="" onerror="this.style.display='none'">`;
      });
    }

    const loadBtn = row.querySelector('.r2-load-btn');
    loadBtn.addEventListener('click', e => { e.stopPropagation(); loadFromR2(item, loadBtn); });
    row.addEventListener('click', () => loadFromR2(item, loadBtn));
    container.appendChild(row);
  });
}

// ── R2 mp3 の先頭をfetchしてID3タグからカバー画像を取得 ──
async function extractR2Cover(mp3Url) {
  try {
    // ID3タグは先頭512KBに収まるのでRangeリクエストで取得
    const res = await fetch(mp3Url, {
      headers: { 'Range': 'bytes=0-524287' }
    });
    if (!res.ok && res.status !== 206) return null;
    const buf = await res.arrayBuffer();
    const tags = await parseTags(buf);
    if (!tags.picture) return null;
    const { mime, data } = tags.picture;
    // Uint8Array → base64
    let bin = '';
    const chunk = 8192;
    for (let i = 0; i < data.length; i += chunk) {
      bin += String.fromCharCode(...data.subarray(i, i + chunk));
    }
    return `data:${mime};base64,${btoa(bin)}`;
  } catch (e) {
    console.warn('extractR2Cover failed:', e.message);
    return null;
  }
}

// ── R2 から音源・LRC を読み込む ──────────────────────
async function loadFromR2(item, btnEl) {
  if (!item.path) { showToast('⚠ パスが不明です'); return; }
  btnEl.classList.add('loading');
  btnEl.innerHTML = '<span class="spinner"></span>';
  setR2Status('読み込み中…', 'info');

  try {
    // 0. 前回セッションをリセット
    audio.pause();
    audio.src = '';
    audio.load();
    ST.lrcLines = []; ST.undoStack = []; ST.timingIndex = 0;
    ST.lyricsArray = []; ST.rawLyrics = '';
    btnUndo.disabled = true;
    lyricsIn.value = ''; lineBadge.textContent = '0 lines';
    lrcRawOut.value = '';
    artImg.classList.remove('on'); artPh.style.display = 'flex';
    artWrap.classList.remove('glow');
    bgArt.classList.remove('visible'); bgArt.style.backgroundImage = '';
    progBar.style.width = '0%'; tCur.textContent = '0:00'; tTot.textContent = '0:00';
    adjSelected = -1;
    updateDisplay(); syncRawOut();

    // 1. 音源セット
    audio.src = r2Url(item.path);
    audio.load();
    ST.loaded   = true; ST.isPlaying = false;
    icoPlay.style.display = 'block'; icoPause.style.display = 'none';
    progBar.style.width   = '0%';
    tCur.textContent      = '0:00';

    const title  = item.title  || item.path.replace(/.*\//, '').replace(/\.[^.]+$/, '');
    const artist = item.artist || 'Unknown Artist';
    inTitle.value  = title; inArtist.value = artist;
    document.getElementById('t-title').textContent  = title;
    document.getElementById('t-artist').textContent = artist;
    document.getElementById('upload-label').textContent = title + ' (R2)';
    document.getElementById('upload-zone').classList.add('loaded');
    buildStaticBars(wCanvas.offsetWidth || 256, 56); drawWave();

    // 2. カバー画像 — mp3先頭をfetchしてID3タグから取得
    extractR2Cover(r2Url(item.path)).then(coverUrl => {
      if (!coverUrl) return;
      artImg.src = coverUrl;
      artImg.onload = () => {
        artImg.classList.add('on'); artPh.style.display = 'none';
        artWrap.classList.add('glow');
        bgArt.style.backgroundImage = `url('${coverUrl}')`;
        bgArt.classList.add('visible');
      };
    });

    // 3. LRCが存在すれば自動インポート
    if (item.lrc) {
      try {
        const res = await fetch(r2Url(item.lrc));
        if (res.ok) { importLRCText(await res.text()); showToast('📄 LRC も自動読み込みしました'); }
      } catch(e) { /* LRC失敗は無視 */ }
    }

    setR2Status(`✓ ${title}`, 'ok');
    showToast('🎵 ' + title);
    setStatus('R2 読み込み完了', 'ok');
  } catch(e) {
    setR2Status('⚠ ' + e.message, 'err');
    showToast('⚠ 読み込み失敗: ' + e.message);
  } finally {
    btnEl.classList.remove('loading');
    btnEl.textContent = '読み込む';
  }
}

function setR2Status(msg, cls) {
  const el = document.getElementById('r2-status');
  el.textContent = msg; el.className = cls || '';
}

// LRC テキストをインポート（共通）
function importLRCText(text) {
  const lines = text.split('\n');
  const hdr   = { title: '', artist: '' };
  const ts    = [], raw = [];
  for (const line of lines) {
    const t = line.trim(); if (!t) continue;
    const mT = t.match(/^\[ti:(.+)\]$/i); if (mT) { hdr.title  = mT[1]; continue; }
    const mA = t.match(/^\[ar:(.+)\]$/i); if (mA) { hdr.artist = mA[1]; continue; }
    if (/^\[[a-z]{2}:.+\]$/i.test(t) && !/^\[\d/.test(t)) continue;
    if (/^\[\d+:\d+\.\d+\]/.test(t)) {
      ts.push(t);
      raw.push(t.replace(/^\[\d+:\d+\.\d+\]/, ''));
    }
  }
  if (!ts.length) return;
  if (hdr.title)  { inTitle.value  = hdr.title;  document.getElementById('t-title').textContent  = hdr.title; }
  if (hdr.artist) { inArtist.value = hdr.artist; document.getElementById('t-artist').textContent = hdr.artist; }
  ST.lyricsArray = raw; ST.lrcLines = ts; ST.timingIndex = ts.length;
  ST.undoStack   = ts.map((l, i) => ({ index: i, line: l }));
  ST.rawLyrics   = raw.join('\n'); btnUndo.disabled = false;
  lyricsIn.value = raw.join('\n'); lineBadge.textContent = raw.length + ' lines';
  updateDisplay(); syncRawOut(); renderAdjPanel();
}

// ─────────────────────────────────────────────────────
//  ELEMENT REFS
// ─────────────────────────────────────────────────────
const audio        = document.getElementById('audio');
const progBar      = document.getElementById('prog-bar');
const progWrap     = document.getElementById('prog-wrap');
const tCur         = document.getElementById('t-cur');
const tTot         = document.getElementById('t-tot');
const artImg       = document.getElementById('art-img');
const artPh        = document.getElementById('art-ph');
const artWrap      = document.getElementById('art-wrap');
const bgArt        = document.getElementById('bg-art');
const lyricsIn     = document.getElementById('lyrics-in');
const inTitle      = document.getElementById('in-title');
const inArtist     = document.getElementById('in-artist');
const lineBadge    = document.getElementById('line-badge');
const wCanvas      = document.getElementById('wave-canvas');
const wCtx         = wCanvas.getContext('2d');
const statusEl     = document.getElementById('status-msg');
const fileInput    = document.getElementById('file-input');
const uploadZone   = document.getElementById('upload-zone');
const uploadLabel  = document.getElementById('upload-label');
const icoPlay      = document.getElementById('ico-play');
const icoPause     = document.getElementById('ico-pause');
const btnUndo      = document.getElementById('btn-undo');
const progressPill = document.getElementById('progress-pill');
const curLineDisp  = document.getElementById('current-line-display');
const nextDisp     = document.getElementById('next-lines-display');
const lrcRawWrap   = document.getElementById('lrc-raw-wrap');
const lrcRawOut    = document.getElementById('lrc-raw-out');
const livePane     = document.getElementById('lyrics-display-pane');

// ─────────────────────────────────────────────────────
//  FILE LOAD
// ─────────────────────────────────────────────────────
uploadZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadAudio(e.target.files[0]); });
uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) loadAudio(e.dataTransfer.files[0]); });

async function loadAudio(file) {
  const ok = file.type.startsWith('audio/') || /\.(mp3|m4a|flac|ogg|aac)$/i.test(file.name);
  if (!ok) { showToast('⚠ 対応していないファイル形式です'); return; }
  ST.audioFile = file; audio.src = URL.createObjectURL(file);
  uploadZone.classList.add('loaded'); uploadLabel.textContent = file.name;
  ST.loaded = true; buildStaticBars(wCanvas.offsetWidth || 256, 56);
  try {
    const tags = await parseTags(await file.arrayBuffer());
    const name = file.name.replace(/\.[^.]+$/, '');
    inTitle.value  = tags.title  || name; inArtist.value = tags.artist || '';
    document.getElementById('t-title').textContent  = tags.title  || name;
    document.getElementById('t-artist').textContent = tags.artist || 'unknown artist';
    if (tags.picture) {
      const url = URL.createObjectURL(new Blob([tags.picture.data], { type: tags.picture.mime }));
      artImg.src = url; artImg.classList.add('on'); artPh.style.display = 'none';
      artWrap.classList.add('glow'); bgArt.style.backgroundImage = `url('${url}')`; bgArt.classList.add('visible');
    }
  } catch(e) { const name = file.name.replace(/\.[^.]+$/, ''); inTitle.value = name; document.getElementById('t-title').textContent = name; }
  showToast('🎵 ' + (inTitle.value || file.name));
}
audio.addEventListener('loadedmetadata', () => { ST.duration = audio.duration; tTot.textContent = fmtTime(audio.duration); drawWave(); });

// ─────────────────────────────────────────────────────
//  TAG PARSERS (compact)
// ─────────────────────────────────────────────────────
async function parseTags(buf) {
  const u8=new Uint8Array(buf);
  if(u8[0]===0x49&&u8[1]===0x44&&u8[2]===0x33)return parseID3v2(u8);
  if(u8.length>11&&u8[4]===0x66&&u8[5]===0x74&&u8[6]===0x79&&u8[7]===0x70)return parseMP4(u8);
  if(u8[0]===0x66&&u8[1]===0x4C&&u8[2]===0x61&&u8[3]===0x43)return parseFLAC(u8);
  if(u8[0]===0x4F&&u8[1]===0x67&&u8[2]===0x67&&u8[3]===0x53)return parseOGG(u8);
  if(u8[0]===0x1A&&u8[1]===0x45&&u8[2]===0xDF&&u8[3]===0xA3)return parseWebM(u8);
  for(let i=1;i<Math.min(u8.length-3,4096);i++){if(u8[i]===0x49&&u8[i+1]===0x44&&u8[i+2]===0x33)return parseID3v2(u8.slice(i));}
  return {};
}
function u32be(d,o){return((d[o]<<24)|(d[o+1]<<16)|(d[o+2]<<8)|d[o+3])>>>0;}
function u32le(d,o){return((d[o+3]<<24)|(d[o+2]<<16)|(d[o+1]<<8)|d[o])>>>0;}
function readUtf8(d){try{return new TextDecoder('utf-8').decode(d).replace(/\0/g,'');}catch(e){return'';}}
function readLatin1(d){try{return new TextDecoder('latin1').decode(d).replace(/\0/g,'');}catch(e){return'';}}
function mimeFromBytes(d){if(!d||d.length<4)return'image/jpeg';if(d[0]===0xFF&&d[1]===0xD8)return'image/jpeg';if(d[0]===0x89&&d[1]===0x50&&d[2]===0x4E&&d[3]===0x47)return'image/png';return'image/jpeg';}
function parseID3v2(u8){const res={};try{const ver=u8[3];const flags=u8[5];const hasE=!!(flags&0x40);const tsz=(u8[6]<<21)|(u8[7]<<14)|(u8[8]<<7)|u8[9];let off=10;if(hasE&&ver>=3){const es=(ver===4)?(u8[10]<<21)|(u8[11]<<14)|(u8[12]<<7)|u8[13]:u32be(u8,10);off+=(ver===4)?es:es+4;}const end=Math.min(10+tsz,u8.length);while(off+(ver===2?6:10)<=end){let fid,fs;if(ver===2){fid=String.fromCharCode(u8[off],u8[off+1],u8[off+2]);fs=(u8[off+3]<<16)|(u8[off+4]<<8)|u8[off+5];off+=6;}else{fid=String.fromCharCode(u8[off],u8[off+1],u8[off+2],u8[off+3]);fs=(ver===4)?(u8[off+4]<<21)|(u8[off+5]<<14)|(u8[off+6]<<7)|u8[off+7]:u32be(u8,off+4);off+=10;}if(fs<=0||off+fs>end)break;const d=u8.slice(off,off+fs);off+=fs;if(fid==='TIT2'||fid==='TT2')res.title=id3Str(d);else if(fid==='TPE1'||fid==='TP1')res.artist=id3Str(d);else if(fid==='APIC'){const p=decAPIC(d);if(p)res.picture=p;}else if(fid==='PIC'){const p=decPIC2(d);if(p)res.picture=p;}}}catch(e){}return res;}
function id3Str(d){if(!d.length)return'';const b=d.slice(1);try{if(d[0]===0)return readLatin1(b);if(d[0]===1||d[0]===2)return new TextDecoder('utf-16').decode(b).replace(/\0/g,'');return readUtf8(b);}catch(e){return'';}}
function decAPIC(d){try{const enc=d[0];let i=1;let me=i;while(me<d.length&&d[me]!==0)me++;i=me+1;i+=1;if(enc===1||enc===2){while(i+1<d.length&&!(d[i]===0&&d[i+1]===0))i+=2;i+=2;}else{while(i<d.length&&d[i]!==0)i++;i+=1;}if(i>=d.length)return null;const img=d.slice(i);return{mime:mimeFromBytes(img),data:img};}catch(e){return null;}}
function decPIC2(d){try{let i=1;const fmt=String.fromCharCode(d[i],d[i+1],d[i+2]).toUpperCase();i+=4;while(i<d.length&&d[i]!==0)i++;i++;if(i>=d.length)return null;const img=d.slice(i);return{mime:fmt==='PNG'?'image/png':'image/jpeg',data:img};}catch(e){return null;}}
function parseMP4(u8){const res={};try{walkBoxes(u8,0,u8.length,res);}catch(e){}return res;}
function walkBoxes(u8,s,e,res){let o=s;while(o+8<=e){let sz=u32be(u8,o);const t=String.fromCharCode(u8[o+4],u8[o+5],u8[o+6],u8[o+7]);if(sz===0)sz=e-o;if(sz<8)break;const be=Math.min(o+sz,e);const inn=o+8;if('moov udta ilst trak mdia minf stbl'.split(' ').includes(t))walkBoxes(u8,inn,be,res);else if(t==='meta')walkBoxes(u8,inn+4,be,res);else if(t==='\xa9nam')res.title=mp4Str(u8,inn,be);else if(t==='\xa9ART'||t==='\xa9art'||t==='aART')res.artist=mp4Str(u8,inn,be);else if(t==='covr'){let co=inn;while(co+8<=be){const dSz=u32be(u8,co);if(dSz>16&&String.fromCharCode(u8[co+4],u8[co+5],u8[co+6],u8[co+7])==='data'){const img=u8.slice(co+16,co+dSz);if(img.length>4)res.picture={mime:mimeFromBytes(img),data:img};}if(dSz<8)break;co+=dSz;}}o=be;}}
function mp4Str(u8,s,e){if(s+16>=e)return'';return readUtf8(u8.slice(s+16,e));}
function parseFLAC(u8){const res={};try{let o=4;while(o+4<=u8.length){const h=u8[o];const last=!!(h&0x80);const bt=h&0x7F;const bs=(u8[o+1]<<16)|(u8[o+2]<<8)|u8[o+3];o+=4;if(o+bs>u8.length)break;const blk=u8.slice(o,o+bs);if(bt===4){const vc=vorbisComment(blk);if(vc.title)res.title=vc.title;if(vc.artist)res.artist=vc.artist;if(vc.picture)res.picture=vc.picture;}else if(bt===6){const p=flacPic(blk);if(p)res.picture=p;}o+=bs;if(last)break;}}catch(e){}return res;}
function flacPic(d){try{let i=4;const mL=u32be(d,i);i+=4;const mime=readUtf8(d.slice(i,i+mL));i+=mL;const dL=u32be(d,i);i+=4+dL+16;const pL=u32be(d,i);i+=4;const img=d.slice(i,i+pL);return{mime:mimeFromBytes(img)||mime,data:img};}catch(e){return null;}}
function parseOGG(u8){const res={};try{let o=0,pg=0;while(o+27<=u8.length&&pg<12){if(u8[o]!==0x4F||u8[o+1]!==0x67||u8[o+2]!==0x67||u8[o+3]!==0x53){o++;continue;}const ns=u8[o+26];let ps=0;for(let s=0;s<ns;s++)ps+=u8[o+27+s];const po=o+27+ns;const p=u8.slice(po,po+ps);if(p[0]===0x03&&p[1]===0x76&&p[2]===0x6F)Object.assign(res,vorbisComment(p.slice(7)));if(p.length>8&&readUtf8(p.slice(0,8))==='OpusTags')Object.assign(res,vorbisComment(p.slice(8)));o=po+ps;pg++;}}catch(e){}return res;}
function vorbisComment(d){const res={};try{let i=0;const vL=u32le(d,i);i+=4+vL;const cnt=u32le(d,i);i+=4;for(let c=0;c<cnt&&i+4<=d.length;c++){const len=u32le(d,i);i+=4;const s=readUtf8(d.slice(i,i+len));i+=len;const eq=s.indexOf('=');if(eq<0)continue;const k=s.slice(0,eq).toUpperCase();const v=s.slice(eq+1);if(k==='TITLE')res.title=v;if(k==='ARTIST')res.artist=v;if(k==='METADATA_BLOCK_PICTURE'){try{const bd=Uint8Array.from(atob(v.replace(/\s/g,'')),c=>c.charCodeAt(0));const p=flacPic(bd);if(p)res.picture=p;}catch(e){}}}}catch(e){}return res;}
function parseWebM(u8){const res={};try{const lim=Math.min(u8.length,524288);for(let i=0;i<lim-4;i++){if(u8[i]===0xFF&&u8[i+1]===0xD8&&u8[i+2]===0xFF){const sl=u8.slice(i,Math.min(i+2097152,u8.length));let end=sl.length;for(let j=2;j<sl.length-1;j++){if(sl[j]===0xFF&&sl[j+1]===0xD9){end=j+2;break;}}res.picture={mime:'image/jpeg',data:sl.slice(0,end)};break;}if(u8[i]===0x89&&u8[i+1]===0x50&&u8[i+2]===0x4E&&u8[i+3]===0x47){res.picture={mime:'image/png',data:u8.slice(i,Math.min(i+2097152,u8.length))};break;}}}catch(e){}return res;}

// ─────────────────────────────────────────────────────
//  WAVEFORM
// ─────────────────────────────────────────────────────
let audioCtx=null,analyser=null,sourceNode=null,rafId=null,staticBars=[];
function buildStaticBars(W,H){staticBars=Array.from({length:Math.floor(W/4)},()=>0.08+Math.random()*0.55);}
function initAudioCtx(){
  if(audioCtx)return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=256;
    analyser.smoothingTimeConstant=0.8;
    sourceNode=audioCtx.createMediaElementSource(audio);
    sourceNode.connect(analyser);
    analyser.connect(audioCtx.destination);
  }catch(e){
    console.warn('Web Audio API init failed (visualizer disabled):', e.message);
    // Web Audio失敗でも再生は継続 — analyserをnullにして波形をスキップ
    audioCtx=null; analyser=null; sourceNode=null;
  }
}
function drawWave(){const W=wCanvas.offsetWidth||256,H=56;if(wCanvas.width!==W){wCanvas.width=W;wCanvas.height=H;}wCtx.clearRect(0,0,W,H);const step=4,bars=Math.floor(W/step);if(analyser&&ST.isPlaying){const data=new Uint8Array(analyser.frequencyBinCount);analyser.getByteFrequencyData(data);for(let i=0;i<bars;i++){const t=i/bars;const bin=Math.floor(Math.pow(t,1.6)*(data.length-1));const val=data[bin]/255;const h=Math.max(2,val*H*0.92);const x=i*step,y=(H-h)/2;const g=wCtx.createLinearGradient(0,y,0,y+h);g.addColorStop(0,`rgba(167,139,250,${0.5+val*0.5})`);g.addColorStop(1,`rgba(96,165,250,${0.4+val*0.4})`);wCtx.fillStyle=g;wCtx.beginPath();if(wCtx.roundRect)wCtx.roundRect(x,y,3,h,1.5);else wCtx.rect(x,y,3,h);wCtx.fill();}}else{if(!staticBars.length)buildStaticBars(W,H);for(let i=0;i<Math.min(bars,staticBars.length);i++){const val=staticBars[i];const h=Math.max(2,val*H*0.7);const x=i*step,y=(H-h)/2;const g=wCtx.createLinearGradient(0,y,0,y+h);g.addColorStop(0,'rgba(167,139,250,.28)');g.addColorStop(1,'rgba(96,165,250,.18)');wCtx.fillStyle=g;wCtx.beginPath();if(wCtx.roundRect)wCtx.roundRect(x,y,3,h,1.5);else wCtx.rect(x,y,3,h);wCtx.fill();}}}
function startViz(){if(rafId)return;function loop(){drawWave();rafId=requestAnimationFrame(loop);}loop();}
function stopViz(){if(rafId){cancelAnimationFrame(rafId);rafId=null;}drawWave();}
drawWave();
window.addEventListener('resize',()=>{buildStaticBars(wCanvas.offsetWidth||256,56);if(!ST.isPlaying)drawWave();});
progWrap.addEventListener('click',e=>{if(!ST.loaded)return;const r=progWrap.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*ST.duration;});
wCanvas.addEventListener('click',e=>{if(!ST.loaded)return;const r=wCanvas.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*ST.duration;});

// ─────────────────────────────────────────────────────
//  PLAYBACK
// ─────────────────────────────────────────────────────
document.getElementById('btn-play').addEventListener('click',togglePlay);
document.getElementById('btn-back').addEventListener('click',()=>audio.currentTime=Math.max(0,audio.currentTime-5));
document.getElementById('btn-fwd') .addEventListener('click',()=>audio.currentTime=Math.min(ST.duration,audio.currentTime+5));
function togglePlay(){if(!ST.loaded){showToast('⚠ 先にMP3を読み込んでください');return;}ST.isPlaying?audio.pause():audio.play();}
audio.addEventListener('play', ()=>{ST.isPlaying=true; icoPlay.style.display='none'; icoPause.style.display='block';try{initAudioCtx();if(audioCtx.state==='suspended')audioCtx.resume();}catch(e){}startViz();});
audio.addEventListener('pause',()=>{ST.isPlaying=false;icoPlay.style.display='block';icoPause.style.display='none';stopViz();});
audio.addEventListener('ended',()=>{ST.isPlaying=false;icoPlay.style.display='block';icoPause.style.display='none';stopViz();});
audio.addEventListener('timeupdate',()=>{const t=audio.currentTime;tCur.textContent=fmtTime(t);if(ST.duration)progBar.style.width=(t/ST.duration*100)+'%';});

// ─────────────────────────────────────────────────────
//  TAP / STAMP / UNDO
// ─────────────────────────────────────────────────────
function handleTap(e){if(e.type==='mousedown'&&e.button!==0)return;if(e.type==='touchstart')e.preventDefault();stamp();}
function stamp(){
  if(!ST.loaded){showToast('⚠ 先にMP3を読み込んでください');return;}
  if(!ST.isPlaying){showToast('▶ 再生中にタップ / Spaceを押してください');return;}
  if(ST.timingIndex>=ST.lyricsArray.length){showToast('✓ 全行のタイミングが完了しています');return;}
  const t=audio.currentTime;const mm=Math.floor(t/60);const sec=t%60;
  const ts=`[${p2(mm)}:${sec.toFixed(2).padStart(5,'0')}]`;
  const lrcLine=ts+ST.lyricsArray[ST.timingIndex];
  ST.lrcLines.push(lrcLine);ST.undoStack.push({index:ST.timingIndex,line:lrcLine});ST.timingIndex++;
  btnUndo.disabled=false;updateDisplay();syncRawOut();adjSelected=ST.timingIndex-1;renderAdjPanel();
  setStatus(`${ts} — ${ST.timingIndex}行目`,'ok');
}
btnUndo.addEventListener('click',undo);
function undo(){
  if(!ST.undoStack.length){showToast('⚠ 戻せる操作がありません');return;}
  ST.undoStack.pop();ST.lrcLines.pop();ST.timingIndex--;
  if(!ST.undoStack.length)btnUndo.disabled=true;
  updateDisplay();syncRawOut();adjSelected=ST.timingIndex;renderAdjPanel();
  setStatus(`↩ ${ST.timingIndex+1}行目を取り消し`,'warn');
}

// ─────────────────────────────────────────────────────
//  LYRICS INPUT
// ─────────────────────────────────────────────────────
lyricsIn.addEventListener('input',onLyricsChange);
function onLyricsChange(){
  const prev=ST.lyricsArray.slice();refreshLyricsArray();const nxt=ST.lyricsArray;
  let rf=ST.timingIndex;
  for(let i=0;i<ST.timingIndex;i++){if(nxt[i]!==prev[i]){rf=i;break;}}
  if(rf<ST.timingIndex){ST.lrcLines=ST.lrcLines.slice(0,rf);ST.undoStack=ST.undoStack.slice(0,rf);ST.timingIndex=rf;btnUndo.disabled=ST.undoStack.length===0;showToast(`⚠ ${rf+1}行目以降のタイムをリセットしました`);}
  updateDisplay();syncRawOut();renderAdjPanel();
}
function refreshLyricsArray(){ST.rawLyrics=lyricsIn.value;ST.lyricsArray=lyricsIn.value.split('\n').filter(l=>l.trim()!=='');lineBadge.textContent=ST.lyricsArray.length+' lines';}

// ─────────────────────────────────────────────────────
//  SPECIAL CHAR INSERT
// ─────────────────────────────────────────────────────
document.getElementById('char-btns').addEventListener('click',e=>{
  const btn=e.target.closest('.char-btn');if(!btn)return;
  const ch=btn.dataset.char;const s=lyricsIn.selectionStart,en=lyricsIn.selectionEnd;
  lyricsIn.value=lyricsIn.value.slice(0,s)+ch+lyricsIn.value.slice(en);
  lyricsIn.selectionStart=lyricsIn.selectionEnd=s+ch.length;lyricsIn.focus();
  refreshLyricsArray();updateDisplay();syncRawOut();
});

// ─────────────────────────────────────────────────────
//  DISPLAY / LRC OUTPUT
// ─────────────────────────────────────────────────────
function updateDisplay(){
  const total=ST.lyricsArray.length,idx=ST.timingIndex;
  if(total===0){progressPill.textContent='待機中';progressPill.className='';}
  else if(idx<total){progressPill.textContent=`${idx+1} / ${total} 行目`;progressPill.className='active';}
  else{progressPill.textContent=`✓ 全 ${total} 行 完了`;progressPill.className='done';}
  if(idx<total)curLineDisp.textContent=ST.lyricsArray[idx];
  else if(total>0)curLineDisp.textContent='✓ 全行完了';
  else curLineDisp.textContent='タップして開始';
  nextDisp.innerHTML='';
  if(ST.rightView==='live'){
    ST.lrcLines.forEach(l=>{const te=l.indexOf(']')+1;const row=document.createElement('div');row.className='lrc-done-row';row.style.animationDelay='0s';row.innerHTML=`<span class="lrc-ts">${l.slice(0,te)}</span><span class="lrc-txt">${esc(l.slice(te))}</span>`;nextDisp.appendChild(row);});
    const us=idx+1;ST.lyricsArray.slice(us,us+5).forEach((line,i)=>{const row=document.createElement('div');row.className='next-line-row';row.innerHTML=`<span class="nl-num">${us+i+1}</span>${esc(line)}`;nextDisp.appendChild(row);});
    nextDisp.scrollTop=nextDisp.scrollHeight;
  }
}
function getLRCHeader(){const t=(inTitle.value||'Untitled').replace(/[\r\n]/g,'');const a=(inArtist.value||'Unknown Artist').replace(/[\r\n]/g,'');return`[ti:${t}]\n[ar:${a}]\n[al:Generated by LRC Studio]\n`;}
function syncRawOut(){lrcRawOut.value=getLRCHeader()+ST.lrcLines.join('\n')+(ST.lrcLines.length?'\n':'');lrcRawOut.scrollTop=lrcRawOut.scrollHeight;}
function toggleRightView(){
  const btn=document.getElementById('btn-toggle-view');
  if(ST.rightView==='live'){ST.rightView='raw';livePane.style.display='none';lrcRawWrap.classList.add('on');btn.textContent='タイミング表示';document.getElementById('rpane-label').textContent='LRC テキスト';syncRawOut();}
  else{ST.rightView='live';livePane.style.display='flex';lrcRawWrap.classList.remove('on');btn.textContent='LRC テキスト表示';document.getElementById('rpane-label').textContent='タイミング';updateDisplay();}
}
function copyLRC(){const text=getLRCHeader()+ST.lrcLines.join('\n');if(!text.trim()){showToast('⚠ コピーするLRCがありません');return;}navigator.clipboard.writeText(text).then(()=>{showToast('✓ LRCをコピーしました');setStatus('コピー完了','ok');}).catch(()=>{lrcRawOut.select();document.execCommand('copy');showToast('✓ コピーしました');});}

// ─────────────────────────────────────────────────────
//  DOWNLOAD
// ─────────────────────────────────────────────────────
function downloadLRCFile(){if(!ST.lrcLines.length){showToast('⚠ タイムスタンプがまだありません');return;}const t=san(inTitle.value)||'Untitled';if(typeof google!=='undefined'&&google.script){google.script.run.withSuccessHandler(()=>setStatus('LRC ダウンロード完了','ok')).withFailureHandler(err=>{clientDL(getLRCHeader()+ST.lrcLines.join('\n'),t+'.lrc');}).generateLRC({title:t,artist:san(inArtist.value)||'Unknown',lrcLines:ST.lrcLines});}else{clientDL(getLRCHeader()+ST.lrcLines.join('\n'),t+'.lrc');setStatus('LRC 保存完了','ok');}}
function downloadTXT(){const raw=lyricsIn.value.trim();if(!raw){showToast('⚠ 歌詞を入力してください');return;}const t=san(inTitle.value)||'untitled';if(typeof google!=='undefined'&&google.script){google.script.run.withSuccessHandler(()=>setStatus('TXT ダウンロード完了','ok')).withFailureHandler(()=>clientDL(raw,t+'.txt')).generateTXT({title:t,rawLyrics:raw});}else{clientDL(raw,t+'.txt');setStatus('TXT 保存完了','ok');}}
function clientDL(text,filename){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));a.download=filename;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);document.body.removeChild(a);},1000);setStatus('保存完了','ok');}

function clearLyrics(){lyricsIn.value='';onLyricsChange();}
function clearTimestamps(){ST.lrcLines=[];ST.undoStack=[];ST.timingIndex=0;btnUndo.disabled=true;updateDisplay();syncRawOut();setStatus('タイムスタンプをクリア','warn');}
function resetTiming(){clearTimestamps();audio.currentTime=0;}
function resetAll(){
  clearLyrics();inTitle.value='';inArtist.value='';
  document.getElementById('t-title').textContent='—';document.getElementById('t-artist').textContent='unknown artist';
  artImg.classList.remove('on');artPh.style.display='flex';artWrap.classList.remove('glow');
  bgArt.classList.remove('visible');bgArt.style.backgroundImage='';
  audio.pause();audio.src='';ST.loaded=false;ST.isPlaying=false;ST.duration=0;
  icoPlay.style.display='block';icoPause.style.display='none';
  progBar.style.width='0%';tCur.textContent='0:00';tTot.textContent='0:00';
  uploadZone.classList.remove('loaded');document.getElementById('upload-label').textContent='MP3 / FLAC / M4A を読み込む';
  progressPill.textContent='待機中';progressPill.className='';
  stopViz();staticBars=[];drawWave();setStatus('');
  document.getElementById('r2-results').innerHTML='';
  document.getElementById('r2-search-in').value='';
  setR2Status('');
}

// ─────────────────────────────────────────────────────
//  KEYBOARD
// ─────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  const tag=document.activeElement.tagName;
  if(tag==='TEXTAREA'||tag==='INPUT')return;
  if(e.code==='Space'){e.preventDefault();ST.isPlaying?stamp():togglePlay();}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
  if(e.code==='ArrowLeft' &&!e.ctrlKey){e.preventDefault();audio.currentTime=Math.max(0,audio.currentTime-5);}
  if(e.code==='ArrowRight'&&!e.ctrlKey){e.preventDefault();audio.currentTime=Math.min(ST.duration,audio.currentTime+5);}
  if(e.key==='['||e.key==='「'){e.preventDefault();if(adjSelected>=0)nudgeTimestamp(adjSelected,-0.1);else if(ST.lrcLines.length){adjSelected=ST.lrcLines.length-1;nudgeTimestamp(adjSelected,-0.1);}}
  if(e.key===']'||e.key==='」'){e.preventDefault();if(adjSelected>=0)nudgeTimestamp(adjSelected,0.1); else if(ST.lrcLines.length){adjSelected=ST.lrcLines.length-1;nudgeTimestamp(adjSelected,0.1);}}
  if(e.code==='ArrowUp'){e.preventDefault();if(adjSelected>0){adjSelected--;renderAdjPanel();}}
  if(e.code==='ArrowDown'){e.preventDefault();if(adjSelected<ST.lrcLines.length-1){adjSelected++;renderAdjPanel();}else if(adjSelected<0&&ST.lrcLines.length){adjSelected=0;renderAdjPanel();}}
});

// ─────────────────────────────────────────────────────
//  SPEED
// ─────────────────────────────────────────────────────
document.getElementById('speed-row').addEventListener('click',e=>{const btn=e.target.closest('.spd-btn');if(!btn)return;audio.playbackRate=parseFloat(btn.dataset.spd);document.querySelectorAll('.spd-btn').forEach(b=>b.classList.toggle('active',b===btn));});

// ─────────────────────────────────────────────────────
//  TIMESTAMP NUDGE PANEL
// ─────────────────────────────────────────────────────
let adjSelected=-1;
function renderAdjPanel(){
  const c=document.getElementById('adj-rows');c.innerHTML='';
  if(!ST.lrcLines.length){c.innerHTML='<div style="font-size:11px;color:var(--muted);padding:4px 0;">タイムスタンプなし</div>';adjSelected=-1;return;}
  ST.lrcLines.forEach((line,i)=>{const te=line.indexOf(']')+1;const ts=line.slice(0,te),txt=line.slice(te);const row=document.createElement('div');row.className='adj-row';row.dataset.i=i;if(i===adjSelected)row.style.background='rgba(167,139,250,.1)';row.innerHTML=`<button class="adj-btn" data-i="${i}" data-d="-0.1">−</button><span class="adj-ts">${ts}</span><span class="adj-txt">${esc(txt)}</span><button class="adj-btn" data-i="${i}" data-d="0.1">＋</button>`;row.addEventListener('click',()=>{adjSelected=i;renderAdjPanel();});c.appendChild(row);});
}
document.getElementById('adj-rows').addEventListener('click',e=>{const btn=e.target.closest('.adj-btn');if(!btn)return;e.stopPropagation();nudgeTimestamp(parseInt(btn.dataset.i),parseFloat(btn.dataset.d));});
function nudgeTimestamp(i,delta){const line=ST.lrcLines[i];const te=line.indexOf(']')+1;const txt=line.slice(te);const m=line.match(/\[(\d+):(\d+\.\d+)\]/);if(!m)return;let s=parseInt(m[1])*60+parseFloat(m[2]);s=Math.max(0,s+delta);const mm=Math.floor(s/60);const rem=(s%60).toFixed(2).padStart(5,'0');ST.lrcLines[i]=`[${p2(mm)}:${rem}]${txt}`;if(ST.undoStack[i])ST.undoStack[i].line=ST.lrcLines[i];renderAdjPanel();syncRawOut();setStatus(`[${p2(mm)}:${rem}] 調整済み`,'ok');}

// ─────────────────────────────────────────────────────
//  .lrc FILE IMPORT
// ─────────────────────────────────────────────────────
document.getElementById('lrc-file-input').addEventListener('change',async e=>{const file=e.target.files[0];if(!file)return;importLRCText(await file.text());showToast(`📄 ${file.name} を読み込みました`);e.target.value='';});

// ─────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────
function fmtTime(s){if(!s||isNaN(s))return'0:00';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
function p2(n){return String(n).padStart(2,'0');}
function san(s){return(s||'').replace(/[\/:*?"<>|]/g,'').replace(/\s+/g,'_').replace(/_+/g,'_').replace(/^_+|_+$/g,'').trim()||'untitled';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setStatus(msg,cls=''){statusEl.textContent=msg;statusEl.className=cls;}
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2600);}
</script>
</body>
</html>
